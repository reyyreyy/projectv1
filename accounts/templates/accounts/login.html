<h2>Login</h2>
<form method="post">
  {% csrf_token %}
  <label>Username:</label>
  <input type="text" name="username"><br>
  <label>Password:</label>
  <input type="password" name="password"><br>
  <button type="submit">Login</button>
  {% if error %}
    <p style="color: red;">{{ error }}</p>
  {% endif %}
</form>
